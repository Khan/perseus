name: "Branch Compare"
description: >-
    Compare artifacts between PR branch and base branch. The job concludes
    as success when identical, as failure when changed (unless the configured
    acknowledgement label is applied). Adds/removes a "change present" label
    automatically and clears the acknowledgement label whenever the diff
    goes empty.

    NOTE: Must be invoked from a workflow triggered by `pull_request` events:
    it reads the PR's base ref, head SHA, number, and labels from the event
    payload and has no meaning outside a pull request.

inputs:
    github-token:
        description: "The Github token to use for authenticated requests."
        required: true
    build-command:
        description: "The command that generates the artifact to compare"
        required: true
    path-to-artifact:
        description: >-
            The path to the artifact to compare (can be a file or directory).
            It should be the same for both the current branch and base branch.
        required: true
    label-name:
        description: "The name of the label to add or remove based on the diff result"
        required: true
    check-name:
        description: >-
            The name to use for the GitHub Check run that surfaces the
            comparison result on the PR.
        required: true
    change-details:
        description: >-
            Optional Markdown body shown in the Check's summary when changes
            are detected, before the diff. Use this to call out follow-ups
            reviewers should perform (e.g. coordinating a downstream release).
        required: false
        default: ""
    ack-label-name:
        description: >-
            Label name that, when applied to the PR, acknowledges the change
            and flips the job from failure to success. A detected change
            without this label fails the job; with the label it passes. The
            label is auto-removed when the diff goes empty so a future
            re-introduction requires a fresh ack.
        required: true

runs:
    using: "composite"
    steps:
        # Fail fast if this action is ever wired into a non-pull_request
        # workflow. Some steps may still run and have weird errors due to
        # missing PR metadata, but we'll have already clearly failed here.
        - name: Assert pull_request context
          if: github.event_name != 'pull_request'
          shell: bash
          run: |
              echo "::error::branch-compare must run from a pull_request-triggered workflow (got event '${{ github.event_name }}')."
              exit 1

        # Create the Check run up front (status: in_progress) so the required
        # check appears immediately and is tied to this run's lifecycle. The
        # final step updates it with the verdict using the check-id.
        #
        # WHY? Posting the Check only at the end left a window where the
        # required-named check didn't exist yet, which surfaced as a stuck
        # "Expected — Waiting for status to be reported" row and made
        # required-status binding racy under heavy workflow re-trigger churn.
        - name: Create in-progress GitHub Check
          id: create-check
          uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
          env:
              CHECK_NAME: ${{ inputs.check-name }}
              HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          with:
              github-token: ${{ inputs.github-token }}
              script: |
                  const {data: check} = await github.rest.checks.create({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      name: process.env.CHECK_NAME,
                      head_sha: process.env.HEAD_SHA,
                      status: "in_progress",
                      output: {
                          title: `${process.env.CHECK_NAME}: Comparing against base branch…`,
                          summary:
                              "Building the artifact for the PR and base " +
                              "branches and diffing them. The result will be " +
                              "posted here when the comparison finishes.",
                      },
                  });
                  core.setOutput("check-run-id", check.id);

        - name: Build for current PR
          shell: bash
          run: ${{ inputs.build-command }}

        - name: Capture output artifact from build-command for current PR
          id: capture-pr-artifacts
          shell: bash
          run: |
              PR_ARTIFACT_DIR="${{ runner.temp }}/branch-compare/pr"
              mkdir -p "$PR_ARTIFACT_DIR"
              if [ -e "${{ inputs.path-to-artifact }}" ]; then
                cp -R ${{ inputs.path-to-artifact }} "$PR_ARTIFACT_DIR/"
              fi
              echo "artifact-path=$PR_ARTIFACT_DIR" >> $GITHUB_OUTPUT

        # Note: We use manual git commands instead of actions/checkout here to
        # avoid a known GitHub Actions runner bug ("Index was out of range")
        # that occurs when calling actions/checkout inside the Post step of a
        # composite action.
        - name: Check out base branch
          shell: bash
          run: |
              git fetch origin ${{ github.event.pull_request.base.ref }} --depth=1
              git checkout FETCH_HEAD

        - name: Build for base
          shell: bash
          run: ${{ inputs.build-command }}

        - name: Capture output artifact from build-command for base branch
          id: capture-base-artifacts
          shell: bash
          run: |
              BASE_ARTIFACT_DIR="${{ runner.temp }}/branch-compare/base"
              mkdir -p "$BASE_ARTIFACT_DIR"
              if [ -e "${{ inputs.path-to-artifact }}" ]; then
                cp -R ${{ inputs.path-to-artifact }} "$BASE_ARTIFACT_DIR/"
              fi
              echo "artifact-path=$BASE_ARTIFACT_DIR" >> $GITHUB_OUTPUT

        - name: Compare Artifacts
          id: compare-artifacts
          shell: bash
          run: |
              # Don't stop execution if an error occurs, we'll capture the
              # return value from `diff` and don't want it to blow up this
              # Github action in cases where it finds differences (non-zero
              # exit code).
              set +e
              # We generate a delimeter as a UUID to avoid the chance of our
              # delimeter showing up in the diff output. A new UUID from this
              # tool is guaranteed to be unique over both space and time.
              DELIM=$(uuidgen)
              echo "diff-content<<$DELIM" >> "$GITHUB_OUTPUT"
              diff --unified "${{ steps.capture-base-artifacts.outputs.artifact-path }}" \
                             "${{ steps.capture-pr-artifacts.outputs.artifact-path }}" >> "$GITHUB_OUTPUT"
              DIFF_EXIT_CODE=$?
              echo "$DELIM" >> "$GITHUB_OUTPUT"
              echo "diff-exit-code=$DIFF_EXIT_CODE" >> "$GITHUB_OUTPUT"

        - name: Add or Remove Label Based on Diff
          if: always()
          env:
              GITHUB_TOKEN: ${{ inputs.github-token }}
          shell: bash
          run: |
              PR_NUMBER="${{ github.event.pull_request.number }}"
              if [ "${{ steps.compare-artifacts.outputs.diff-exit-code }}" == "0" ]; then
                  gh pr edit "$PR_NUMBER" --remove-label "${{ inputs.label-name }}" || true
                  # Drop the ack label too: nothing to acknowledge anymore. If
                  # a future commit reintroduces a diff, the author will need
                  # to re-apply the label, which is the desired behaviour.
                  gh pr edit "$PR_NUMBER" --remove-label "${{ inputs.ack-label-name }}" || true
              else
                  gh pr edit "$PR_NUMBER" --add-label "${{ inputs.label-name }}"
              fi

        # Finalize the Check run created up front: update it with the
        # meaningful pass/fail and the rich summary. The job itself always
        # succeeds; this custom Check carries the verdict. That keeps the PR's
        # checks list to a single red row when a change is detected, and
        # clicking the row lands directly on a page that renders the title +
        # rich summary (rather than the workflow logs, where reviewers
        # struggle to find the Summary tab). Falls back to creating the Check
        # if the up-front creation step errored before reporting its id (so
        # the verdict is never lost). Runs with `always()` so the verdict is
        # posted even when an earlier step failed.
        - name: Finalize the GitHub Check
          if: always()
          uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
          env:
              CHECK_NAME: ${{ inputs.check-name }}
              CHECK_RUN_ID: ${{ steps.create-check.outputs.check-run-id }}
              COMPARE_OUTCOME: ${{ steps.compare-artifacts.outcome }}
              DIFF_EXIT_CODE: ${{ steps.compare-artifacts.outputs.diff-exit-code }}
              DIFF_CONTENT: ${{ steps.compare-artifacts.outputs.diff-content }}
              CHANGE_DETAILS: ${{ inputs.change-details }}
              ACK_LABEL_NAME: ${{ inputs.ack-label-name }}
              HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          with:
              github-token: ${{ inputs.github-token }}
              script: |
                  const checkName = process.env.CHECK_NAME;
                  const ackLabel = process.env.ACK_LABEL_NAME;

                  // We only have a meaningful verdict if the diff step ran to
                  // completion. Because this step uses `always()`, it also
                  // fires when an earlier step failed — in which case
                  // `compare-artifacts` is skipped and DIFF_EXIT_CODE is
                  // empty. Treat that as a broken run, NOT as a detected
                  // change; otherwise a crashed job masquerades as a
                  // schema/bundle change that a reviewer might even ack.
                  const comparisonRan =
                      process.env.COMPARE_OUTCOME === "success" &&
                      process.env.DIFF_EXIT_CODE !== "";
                  const noChanges = process.env.DIFF_EXIT_CODE === "0";

                  const labels = (context.payload.pull_request?.labels || [])
                      .map((l) => l.name);
                  const isAcked = labels.includes(ackLabel);

                  // The Checks UI renders `output.title` as a heading above
                  // the summary, so the summary should NOT repeat the title.
                  let conclusion;
                  let title;
                  let summary;
                  if (!comparisonRan) {
                      // A step before the diff failed, so there's no verdict.
                      // Report a clearly-distinct, blocking error state rather
                      // than a misleading "changes detected".
                      conclusion = "failure";
                      title = `${checkName}: ⚠️ Comparison could not be completed`;
                      summary =
                          "A step in the comparison job failed, so the diff " +
                          "could not be computed. This is **not** a detected " +
                          "schema/bundle change — re-run the job, and if it " +
                          "keeps failing, check the workflow logs.";
                  } else if (noChanges) {
                      conclusion = "success";
                      title = `${checkName}: No Changes ✅`;
                      summary = "No differences vs. the base branch.";
                  } else {
                      // A real diff exists: acked changes pass, unacked fail.
                      conclusion = isAcked ? "success" : "failure";
                      title = isAcked
                          ? `${checkName}: Changes Acknowledged ✅`
                          : `${checkName}: Changes Detected — Review Required ❌`;

                      const details = (process.env.CHANGE_DETAILS || "").trim();
                      const diff = process.env.DIFF_CONTENT || "";
                      // Render the ack label as a link to its label page so
                      // reviewers can see the real label badge (and the PRs
                      // currently carrying it) with one click.
                      const labelUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/labels/${encodeURIComponent(ackLabel)}`;
                      const ackLabelMd = `[\`${ackLabel}\`](${labelUrl})`;
                      const parts = [];
                      if (details) {
                          parts.push(details, "");
                      }
                      if (isAcked) {
                          parts.push(
                              `> Acknowledged via the **${ackLabelMd}** label. Remove the label to require re-acknowledgement.`,
                              "",
                          );
                      } else {
                          parts.push(
                              `👀 **Review the diff below.** Once you've confirmed the change is intentional and any required follow-ups are in motion, add the ${ackLabelMd} label to acknowledge. The check will re-run automatically.`,
                              "",
                          );
                      }
                      parts.push(
                          "<details open><summary>View diff</summary>",
                          "",
                          "```diff",
                          diff,
                          "```",
                          "",
                          "</details>",
                      );
                      summary = parts.join("\n");
                  }

                  const checkRunId = process.env.CHECK_RUN_ID
                      ? Number(process.env.CHECK_RUN_ID)
                      : null;

                  if (checkRunId) {
                      // Normal path: update the in_progress Check created up front.
                      await github.rest.checks.update({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          check_run_id: checkRunId,
                          status: "completed",
                          conclusion,
                          output: {title, summary},
                      });
                  } else {
                      // Fallback: the up-front creation step didn't run, so
                      // create a completed Check now rather than lose the verdict.
                      await github.rest.checks.create({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          name: checkName,
                          head_sha: process.env.HEAD_SHA,
                          status: "completed",
                          conclusion,
                          output: {title, summary},
                      });
                  }
