name: Release

on:
    push:
        branches: [main]
    pull_request:
        types: [opened]
    issue_comment:
        types: [created]

    workflow_dispatch:
        inputs:
            run_type:
                description: "The type of publish to run"
                required: true
                default: "snapshot"
                type: choice
                options:
                    - snapshot
                    - release
            pr_number:
                description: "PR number (required when run_type is snapshot)"
                required: false
                type: string

env:
    # Identifies the PR comment that documents/reports on npm snapshots, so
    # that we only ever create one comment related to snapshots for any given
    # PR. This also makes it very easy to find the comment to update it when
    # needed.
    SNAPSHOT_COMMENT_MARKER: "<!-- perseus-snapshot-comment -->"

# IMPORTANT! We set concurrency to this workflow and the branch (github.ref),
# meaning that this workflow can only run one instance, per branch, at a time.
# This prevents us from having two production releases publishing at the same
# time, creating a race condition, and from trying to publish multiple snapshots
# for the same PR at the same time (potentially publishing an earlier commit as
# "latest" and causing confusion).
#
# We also do not want to cancel in-progress runs, because we don't want a
# production publish to be interrupted by a snapshot publish ever.
concurrency:
    # For snapshot jobs, key by PR number so each PR gets its own serialization
    # slot. For release jobs, key by ref so only one production release runs at
    # a time per branch. issue_comment events carry the default-branch ref, so
    # without this distinction all snapshot runs would serialize together.
    group: >-
        ${{ github.workflow }}-${{
          github.event_name == 'issue_comment' && github.event.issue.number ||
          github.ref }}
    # IMPORTANT! We do not want to cancel in-progress runs, because we don't
    # want a production publish to be interrupted by a snapshot publish ever.
    cancel-in-progress: false

jobs:
    # Posts a comment on newly-opened PRs explaining how to request an npm
    # snapshot. The `publish_snapshot` job below looks up this same comment
    # (via the `<!-- perseus-snapshot-comment -->` marker, shared across this
    # comment and the snapshot success/failure comments) and rewrites it in
    # place, so a PR only ever has one snapshot-related comment.
    post_snapshot_info:
        name: Post snapshot info comment
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        permissions:
            pull-requests: write # For creating the "how to snapshot" comment
        steps:
            # Guards against creating a second comment if this job is manually
            # re-run (e.g. via "Re-run jobs" in the Actions UI). If a snapshot
            # comment already exists, we leave it untouched rather than
            # overwrite it, since it may already reflect a snapshot someone
            # requested.
            - name: Find existing comment
              uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
              id: find-comment
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  comment-author: "github-actions[bot]"
                  body-includes: "${{ env.SNAPSHOT_COMMENT_MARKER }}"

            - name: Create snapshot info comment
              if: steps.find-comment.outputs.comment-id == ''
              uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
              with:
                  issue-number: ${{ github.event.pull_request.number }}
                  body: >-
                      ${{ env.SNAPSHOT_COMMENT_MARKER }}

                      # npm Snapshot

                      Want to try this PR's changes before it merges? Comment
                      `/snapshot` below and we'll publish an npm snapshot you
                      can install right away.

    # Production Release
    #
    # This workflow will run changesets depending on two different scenarios:
    #
    # 1. If we are landing a specific commit into main (Author PR), then
    #    changesets will check if there are changes verifying the Markdown files
    #    generated automatically:
    #      a) There are new versions and there's NO Release PR, then the
    #         changesets action will create a new Release PR.
    #      b) There's a Release PR, then the changesets action will update the
    #         existing Release PR with the new commit.
    #
    #    NOTE: in both cases, changesets will modify the new version in
    #    package.json for each package, and will remove the MD files as part of the
    #    Release PR.
    #
    # 2. If we are landing the Release PR into main, then the changesets action
    #    will publish the changes to npm.
    #
    # For more info about this workflow, see:
    # https://github.com/changesets/action#usage
    release:
        name: Release
        if: |
            (github.event_name == 'workflow_dispatch' && inputs.run_type == 'release') ||
            (github.event_name == 'push' && github.ref == 'refs/heads/main')
        runs-on: ${{ matrix.os }}
        permissions:
            id-token: write # For trusted publishing to npm (includes provenance)
            contents: write # For GitHub pages and creating release PRs
        strategy:
            matrix:
                os: [ubuntu-latest]
                node-version: [24.16.0]
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  # IMPORTANT: Although we don't _need_ to use this token to
                  # checkout the code, setting it here defines (authenticates)
                  # the git push later on that the changesets step makes to the
                  # "Version Packages" PR branch. That push's identity becomes
                  # the triggering actor of the resulting pull_request event.
                  # The default GITHUB_TOKEN pushes as github-actions[bot],
                  # which GitHub now (as of May/June 2026) blocks behind manual
                  # approval ("action_required"). The khan-actions-bot PAT is a
                  # trusted member, so its pushes run without the approval
                  # gate.
                  token: ${{ secrets.KHAN_ACTIONS_BOT_TOKEN }}
                  fetch-depth: 0

            - name: Secure Network
              uses: Khan/actions@secure-network-v1
              timeout-minutes: 5
              with:
                  conf-files: .github/npm-extra-domains.conf
                  # hooks.slack.com: Slack webhook for publish success/failure notifications
                  # fulcio.sigstore.dev,rekor.sigstore.dev: signing certificates are stored here
                  extra-domains: hooks.slack.com fulcio.sigstore.dev rekor.sigstore.dev

            - name: Install & cache node_modules
              uses: ./.github/actions/shared-node-cache
              with:
                  node-version: ${{ matrix.node-version }}

            - name: ⬆️ Upgrade npm for OIDC support
              shell: bash
              run: |
                  # npm trusted publishing requires npm CLI v11.5.1+, but NOT
                  # the new v12, which is broken when detecting which packages
                  # need to be published!
                  #
                  # Node.js 22 ships with npm 10.x, so we need to upgrade
                  npm install -g npm@11
                  echo "✅ npm upgraded to $(npm --version)"

            - name: Create Release Pull Request or Publish to npm
              id: changesets
              uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
              with:
                  publish: pnpm publish:ci
              env:
                  # We use a Personal Access Token here rather than the GITHUB_TOKEN
                  # so that it will trigger our other actions. The token has to be on
                  # the account of someone with appropriate access levels and given the
                  # repo scope.
                  GITHUB_TOKEN: ${{ secrets.KHAN_ACTIONS_BOT_TOKEN }}
                  # Note: we no longer use the NPM_TOKEN secret because we've enabled
                  # Trusted Publishing (https://docs.npmjs.com/trusted-publishers) on
                  # the npmjs.com side:
                  # https://www.npmjs.com/package/@khanacademy/mathjax-renderer/access
                  #
                  # We set this so that (p)npm publish will include the
                  # provenance information in the package.json file and surface
                  # it in the npm registry.
                  # See: https://docs.npmjs.com/generating-provenance-statements
                  NPM_CONFIG_PROVENANCE: true

            - name: Send a Slack notification if a publish fails
              if: failure()
              uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
              env:
                  SLACK_WEBHOOK: ${{ secrets.SLACK_EXERCISENEXT_WEBHOOK }}
                  SLACK_CHANNEL: eng-perseus
                  SLACK_MSG_AUTHOR: ${{ github.event.pull_request.user.login }}
                  SLACK_USERNAME: GithubGoose
                  SLACK_ICON_EMOJI: ":goose:"
                  SLACK_MESSAGE: "Something went wrong with the release of ${{ github.event.repository.name }}. \nPlease check the logs → https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  SLACK_TITLE: "Oops! I'm the Bad News Goose!"
                  SLACK_FOOTER: Perseus Slack Notification
                  MSG_MINIMAL: true

            - name: Send a Slack notification for web if a publish happens
              if: steps.changesets.outputs.published == 'true'
              uses: rtCamp/action-slack-notify@e31e87e03dd19038e411e38ae27cbad084a90661 # v2.3.3
              env:
                  SLACK_WEBHOOK: ${{ secrets.SLACK_EXERCISENEXT_WEBHOOK }}
                  SLACK_CHANNEL: eng-perseus
                  SLACK_MSG_AUTHOR: ${{ github.event.pull_request.user.login }}
                  SLACK_USERNAME: GithubGoose
                  SLACK_ICON_EMOJI: ":goose:"
                  SLACK_MESSAGE: "A new version of ${{ github.event.repository.name }} was published! \nRelease notes → https://github.com/${{ github.repository }}/releases/"
                  SLACK_TITLE: "New Perseus release!"
                  SLACK_FOOTER: Perseus Slack Notification
                  MSG_MINIMAL: true

    publish_snapshot:
        name: Publish npm snapshot
        # Snapshots are on-demand only (either):
        # - comment '/snapshot' on a PR (Khan Academy org members only)
        # - trigger manually via workflow_dispatch.
        # We skip "Version Packages" PRs since those are release-prep, not
        # feature work.
        #   Note that the `if` check here gates on finding `/snapshot`
        #   _anywhere_ in the comment (contains()), but we'll do a better job
        #   checking exactly lower down when we resolve the PR number. So this
        #   `if` check is just a "fail fast".
        if: |
            (github.event_name == 'workflow_dispatch' && inputs.run_type == 'snapshot') ||
            (github.event_name == 'issue_comment' &&
             github.event.issue.pull_request != null &&
             contains(github.event.comment.body, '/snapshot') &&
             (github.event.comment.author_association == 'OWNER' ||
              github.event.comment.author_association == 'MEMBER'))
        runs-on: ${{ matrix.os }}
        permissions:
            id-token: write # For trusted publishing to npm (includes provenance)
            pull-requests: write # For creating/updating "snapshot created/updated" comment
            issues: write # For PR comments
        strategy:
            matrix:
                os: [ubuntu-latest]
                node-version: [24.16.0]
        steps:
            # Resolve the PR number regardless of how the workflow was triggered:
            # - issue_comment: read from github.event.issue.number
            # - workflow_dispatch: read from the pr_number input (required)
            - name: Resolve PR number
              id: pr
              env:
                  COMMENT_BODY: ${{ github.event.comment.body }}
              run: |
                  if [ "${{ github.event_name }}" = "issue_comment" ]; then
                    if ! echo "$COMMENT_BODY" | grep -Eqx '\s*/snapshot\s*'; then
                      echo "Comment is not exactly '/snapshot'. Skipping." >&2
                       exit 1
                    fi
                    # For issue_comment events, GitHub represents a PR as an
                    # "issue" under the hood, so github.event.issue.number is
                    # the PR number.
                    echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
                  elif [ -n "${{ inputs.pr_number }}" ]; then
                    echo "number=${{ inputs.pr_number }}" >> $GITHUB_OUTPUT
                  else
                    echo "Error: pr_number input is required for workflow_dispatch." >&2
                    exit 1
                  fi

            - name: React to /snapshot comment
              if: github.event_name == 'issue_comment'
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh api \
                    repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
                    -X POST -f content='eyes'

            # We need to checkout all history, so that the changeset tool can diff it.
            # We check out the PR's merge commit so we publish what would land on main.
            - name: Checkout current commit
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  token: ${{ secrets.KHAN_ACTIONS_BOT_TOKEN }}
                  ref: refs/pull/${{ steps.pr.outputs.number }}/merge
                  fetch-depth: "0"

            - name: Secure Network
              uses: Khan/actions@secure-network-v1
              timeout-minutes: 5
              with:
                  conf-files: .github/npm-extra-domains.conf
                  # fulcio.sigstore.dev,rekor.sigstore.dev: signing certificates are stored here
                  extra-domains: fulcio.sigstore.dev rekor.sigstore.dev

            - name: Ensure main branch is available
              run: |
                  REF=$(git rev-parse HEAD)
                  git checkout main
                  git checkout $REF

            # Helper to get the URL of the current run.
            - name: Get workflow run URL
              id: get-run-url
              run: echo "run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> $GITHUB_OUTPUT

            - name: Install & cache node_modules
              uses: ./.github/actions/shared-node-cache
              with:
                  node-version: ${{ matrix.node-version }}

            - name: ⬆️ Upgrade npm for OIDC support
              shell: bash
              run: |
                  # npm trusted publishing requires npm CLI v11.5.1+, but NOT
                  # the new v12, which is broken when detecting which packages
                  # need to be published!
                  #
                  # Node.js 22 ships with npm 10.x, so we need to upgrade
                  npm install -g npm@11
                  echo "✅ npm upgraded to $(npm --version)"

            - name: Publish Snapshot Release to npm
              id: publish-snapshot
              run: ./utils/publish-snapshot.sh ${{ steps.pr.outputs.number }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Note: we no longer use the NPM_TOKEN secret because we've enabled
                  # Trusted Publishing (https://docs.npmjs.com/trusted-publishers) on
                  # the npmjs.com side:
                  # https://www.npmjs.com/package/@khanacademy/mathjax-renderer/access

            - name: Calculate short SHA for this commit
              id: short-sha
              # We capture HEAD after checkout rather than using
              # github.event.pull_request.head.sha, which isn't available for
              # issue_comment events.
              run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

            # Note: these two actions are locked to the latest version that were
            # published when I created this yml file (just for security).
            - name: Find existing comment
              # Even if we're failing, we want to update the comments.
              if: always()
              uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
              id: find-comment
              with:
                  issue-number: ${{ steps.pr.outputs.number }}
                  comment-author: "github-actions[bot]"
                  body-includes: "${{ env.SNAPSHOT_COMMENT_MARKER }}"

            - name: Create or update npm snapshot comment - success
              if: steps.publish-snapshot.outputs.npm_snapshot_tag != ''
              uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
              with:
                  issue-number: ${{ steps.pr.outputs.number }}
                  comment-id: ${{ steps.find-comment.outputs.comment-id }}
                  edit-mode: replace
                  body: |
                      ${{ env.SNAPSHOT_COMMENT_MARKER }}
                      # npm Snapshot: Published

                      Good news!! We've packaged up the latest commit from this PR (${{
                      steps.short-sha.outputs.short_sha }}) and published it to npm. You
                      can install it using the tag `${{
                      steps.publish-snapshot.outputs.npm_snapshot_tag }}`.

                      Example:
                      ```sh
                      pnpm add @khanacademy/perseus@${{
                      steps.publish-snapshot.outputs.npm_snapshot_tag }}
                      ```

                      If you are working in Khan Academy's frontend, you can run the below command.
                      ```sh
                      ./dev/tools/bump_perseus_version.ts -t PR${{ steps.pr.outputs.number }}
                      ```

                      If you are working in Khan Academy's webapp, you can run the below command.
                      ```sh
                      ./dev/tools/bump_perseus_version.js -t PR${{ steps.pr.outputs.number }}
                      ```

                      ---
                      Want another snapshot? Comment `/snapshot` again.

            - name: Create or update npm snapshot comment - failure, snapshot publish failed
              if: steps.publish-snapshot.outputs.npm_snapshot_tag == ''
              uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
              with:
                  issue-number: ${{ steps.pr.outputs.number }}
                  comment-id: ${{ steps.find-comment.outputs.comment-id }}
                  edit-mode: replace
                  body: |
                      ${{ env.SNAPSHOT_COMMENT_MARKER }}
                      # npm Snapshot: **NOT** Published

                      Oh noes!! We couldn't find any changesets in this PR (${{
                      steps.short-sha.outputs.short_sha }}). As a result, we did not
                      publish an npm snapshot for you.

                      ---
                      Want to try again? Comment `/snapshot` once you've added a changeset.

            - name: Create or update npm snapshot comment - failure, concurrent with release
              if: failure() && steps.check-release.outputs.release_count != '0'
              uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5.0.0
              with:
                  issue-number: ${{ steps.pr.outputs.number }}
                  comment-id: ${{ steps.find-comment.outputs.comment-id }}
                  edit-mode: replace
                  body: |
                      ${{ env.SNAPSHOT_COMMENT_MARKER }}
                      # npm Snapshot: **NOT** Published

                      Oh noes!! We couldn't publish an npm snapshot for you because
                      there is a release in progress. Please wait for the release to
                      finish, then retry this workflow.

                      [View the workflow run](${{ steps.get-run-url.outputs.run_url }})

                      ---
                      Want to try again? Comment `/snapshot` once the release has finished.

            - name: React to /snapshot comment on success
              if: >-
                  github.event_name == 'issue_comment' &&
                  steps.publish-snapshot.outputs.npm_snapshot_tag != ''
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  gh api \
                    repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
                    -X POST -f content='rocket'
