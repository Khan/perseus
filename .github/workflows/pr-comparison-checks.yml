name: PR Comparison Checks

# Comparison checks build the PR branch and the base branch separately and diff
# a specific artifact between the two. They live in their own workflow (separate
# from `node-ci.yml`) because they react to PR metadata changes — specifically
# `labeled` / `unlabeled` events for the acknowledgement flow — which the rest
# of CI does not.
#
# Each job's own pass/fail IS the required status check: a native job check
# binds to required-status rules reliably, whereas a detached Checks-API check
# lands in an arbitrary check suite and binds flakily. The job always runs so
# it always reports (a "skipped" required check would be treated as passing and
# let an unacknowledged change through): on code events it builds + diffs; on
# label events it derives the verdict from the labels without rebuilding. See
# ./.github/actions/branch-compare.

on:
    pull_request:
        types: [opened, synchronize, reopened, edited, labeled, unlabeled]

permissions:
    contents: read
    pull-requests: write
    issues: write

# Single source of truth for the Node version these checks build under.
# (See the note on each job for why these jobs deliberately avoid a matrix.)
env:
    NODE_VERSION: "24.18.0"

jobs:
    check_schema_change:
        name: "Schema Change"
        # Scope concurrency to this job (not the whole workflow) so toggling
        # one check's ack label can't cancel the other check's in-flight run.
        concurrency:
            group: ${{ github.workflow }}-schema-change-${{ github.event.pull_request.number || github.ref }}
            cancel-in-progress: true
        runs-on: ${{ vars.USE_GITHUB_RUNNERS == 'true' && 'ubuntu-latest' || 'ephemeral-runner' }}
        # No matrix here, on purpose: a matrix appends its values to the check
        # name (e.g. "Schema Change (ubuntu-latest, 24.x)"), so bumping Node
        # would rename the required check and cause the Ruleset that protects
        # against unintended schema changes to break. A single, suffix-free
        # name (Node comes from the NODE_VERSION env above) keeps the
        # required-status rules stable across upgrades.
        # See ruleset: https://github.com/Khan/perseus/settings/rules/17139544
        steps:
            - name: Check out latest commit
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            # Skipped on label events (no build happens then). Kept here rather
            # than inside branch-compare so the egress lock-down stays visible
            # at the workflow level.
            - name: Secure Network
              if: ${{ github.event.action != 'labeled' && github.event.action != 'unlabeled' }}
              uses: Khan/actions@secure-network-v1
              timeout-minutes: 5
              with:
                  conf-files: .github/npm-extra-domains.conf

            - name: Compare Perseus Schema to base branch
              uses: ./.github/actions/branch-compare
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  node-version: ${{ env.NODE_VERSION }}
                  build-command: |
                      pnpm install && \
                      pnpm tsc --declaration --emitDeclarationOnly --removeComments \
                        --outfile ${{ runner.temp }}/schema.d.ts \
                        packages/perseus-core/src/data-schema.ts
                      pnpm prettier --write ${{ runner.temp }}/schema.d.ts
                  path-to-artifact: ${{ runner.temp }}/schema.d.ts
                  label-name: schema-change
                  ack-label-name: schema-change-ack
                  # Folded (`>`) so paragraphs can wrap freely. Two blank lines
                  # are required for a Markdown paragraph break. Markdown links
                  # must stay on one line — folding inserts spaces between
                  # content lines, which would break URLs.
                  change-details: >
                      **This PR contains critical changes to Perseus that
                      affect published data.** Please review the changes
                      and note that you may need to coordinate deployment
                      of these changes with other teams at Khan Academy,
                      especially with #cp-eng to publish a content update.


                      Usually this means you need to update the Go parser
                      that Content Platform maintains. Follow these
                      [steps](https://khanacademy.atlassian.net/wiki/spaces/LC/pages/4161831001/Releasing+and+deploying+a+data-schema+change+in+Perseus#tl%3Bdr)
                      on how to release.
                      [See this list of post-mortems for more information.](https://khanacademy.atlassian.net/wiki/spaces/ENG/pages/4504322159/Content+Platform+Breaks)

    check_item_splitting:
        name: "Item Splitting"
        # Scope concurrency to this job (not the whole workflow) so toggling
        # one check's ack label can't cancel the other check's in-flight run.
        concurrency:
            group: ${{ github.workflow }}-item-splitting-${{ github.event.pull_request.number || github.ref }}
            cancel-in-progress: true
        runs-on: ${{ vars.USE_GITHUB_RUNNERS == 'true' && 'ubuntu-latest' || 'ephemeral-runner' }}
        # No matrix here, on purpose: a matrix appends its values to the check
        # name (e.g. "Item Splitting (ubuntu-latest, 24.x)"), so bumping Node
        # would rename the required check and cause the Ruleset that protects
        # against unintended item-splitting changes to break. A single,
        # suffix-free name (Node comes from the NODE_VERSION env above) keeps
        # the required-status rules stable across upgrades.
        # See ruleset: https://github.com/Khan/perseus/settings/rules/17139544
        steps:
            - name: Check out latest commit
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            # Skipped on label events (no build happens then). Kept here rather
            # than inside branch-compare so the egress lock-down stays visible
            # at the workflow level.
            - name: Secure Network
              if: ${{ github.event.action != 'labeled' && github.event.action != 'unlabeled' }}
              uses: Khan/actions@secure-network-v1
              timeout-minutes: 5
              with:
                  conf-files: .github/npm-extra-domains.conf

            - name: Use branch-compare action to generate item splitting artifacts
              uses: ./.github/actions/branch-compare
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  node-version: ${{ env.NODE_VERSION }}
                  # esbuild produces a deliberately non-minified bundle for
                  # comparison purposes — the production build pipeline
                  # (rollup + swc + minification) is too noisy for diffs.
                  # We bundle from source rather than diffing the production
                  # artifact so we're insulated from build-pipeline drift.
                  #
                  # The explicit `esbuild` devDep in package.json is pinned
                  # independently of the version Vite pulls in transitively.
                  # That's intentional: this check produces a code-level diff
                  # between base and PR, and we don't need it to track the
                  # production toolchain. If Vite is bumped and the bundled
                  # esbuild drifts from our pin, two copies will end up in
                  # node_modules. That's acceptable here — bumping our pin
                  # to match is a courtesy, not a correctness requirement.
                  build-command: |
                      pnpm install
                      pnpm exec esbuild packages/perseus-core/src/index.item-splitting.ts \
                        --bundle \
                        --format=esm \
                        --platform=neutral \
                        --target=es2022 \
                        --outfile=${{ runner.temp }}/item-splitting.bundle.js
                  path-to-artifact: ${{ runner.temp }}/item-splitting.bundle.js
                  label-name: item-splitting-change
                  ack-label-name: item-splitting-change-ack
