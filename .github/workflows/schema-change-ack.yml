name: Schema Change Ack

# Re-runs the schema-change check when the `schema-change-ack` label is added
# or removed from a PR. The shared `branch-compare` action reads the PR's
# current labels and concludes the Check accordingly: success when the ack
# label is present, failure when it isn't and a schema diff exists.
#
# Other jobs in `node-ci.yml` are deliberately not retriggered on label
# events — keep them on push/synchronize only — so this workflow is split
# out to scope label-event runs to just the schema check.
on:
    pull_request:
        types: [labeled, unlabeled]

permissions:
    contents: read
    pull-requests: write
    issues: write
    checks: write

concurrency:
    group: schema-change-ack-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    re_check_schema:
        name: Check for schema changes
        if: github.event.label.name == 'schema-change-ack'
        runs-on: ${{ vars.USE_GITHUB_RUNNERS == 'true' && '${{ matrix.os }}' || 'ephemeral-runner' }}
        strategy:
            matrix:
                os: [ubuntu-latest]
                node-version: [24.x]
        steps:
            - name: Install uuidgen
              run: |
                  sudo apt-get update
                  sudo apt-get install uuid-runtime

            - name: Check out latest commit
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Secure Network
              uses: Khan/actions@secure-network-v1
              timeout-minutes: 5
              with:
                  conf-files: .github/npm-extra-domains.conf

            - name: Install & cache node_modules
              uses: ./.github/actions/shared-node-cache
              with:
                  node-version: ${{ matrix.node-version }}

            - name: Compare Perseus Schema to base branch
              uses: ./.github/actions/branch-compare
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  build-command: |
                      pnpm install && \
                      pnpm tsc --declaration --emitDeclarationOnly --removeComments \
                        --outfile ${{ runner.temp }}/schema.d.ts \
                        packages/perseus-core/src/data-schema.ts
                      pnpm prettier --write ${{ runner.temp }}/schema.d.ts
                  path-to-artifact: ${{ runner.temp }}/schema.d.ts
                  label-name: schema-change
                  check-name: 🗄️ Schema Change
                  ack-label-name: schema-change-ack
                  change-details: |
                      **Usually this means you need to update the Go parser
                      that Content Platform maintains!!!**
                      Follow these [steps](https://khanacademy.atlassian.net/wiki/spaces/LC/pages/4161831001/Releasing+and+deploying+a+data-schema+change+in+Perseus#tl%3Bdr) on how to release.
                      [See this list of post-mortems for more information.](https://khanacademy.atlassian.net/wiki/spaces/ENG/pages/4504322159/Content+Platform+Breaks)

                      This PR contains critical changes to Perseus that affect published data.
                      Please review the changes and note that you may need to
                      coordinate deployment of these changes with other teams
                      at Khan Academy, especially with #cp-eng to publish a
                      content update.
