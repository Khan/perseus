# Used by utils/start-perseus-in-local-server.ts to mount Perseus and the
# frontend repo at their exact host paths inside the rspack container, so
# all absolute paths in pnpm-lock.yaml and virtual-store symlinks resolve
# correctly.
#
# Requires PERSEUS_ROOT and FRONTEND_ROOT to be set in the env passed to
# docker compose (written into docker-compose.env by the script).
services:
    rspack:
        environment:
            # frontend's docker-compose.yml sets RSPACK_HMR_HOSTNAME=hmr.khanacademy.dev,
            # which routes the HMR WebSocket through the TLS proxy. That subdomain
            # doesn't resolve in DNS yet (the companion tlsproxy routing change is
            # pending), so the browser gets ERR_NAME_NOT_RESOLVED and HMR breaks.
            # Unset it here to fall back to the legacy direct-WebSocket mode:
            # rspack listens on HTTPS port 8226 and the browser connects to
            # wss://localhost:8226 directly, bypassing the TLS proxy entirely.
            RSPACK_HMR_HOSTNAME: ""
        ports:
            # Legacy HMR: rspack-dev-server listens on HTTPS port 8226 for the
            # HMR WebSocket when RSPACK_HMR_HOSTNAME is unset.
            - "8226:8226"
        volumes:
            - "${PERSEUS_ROOT}:${PERSEUS_ROOT}"
            - "${FRONTEND_ROOT}:${FRONTEND_ROOT}"