# Used by utils/start-perseus-in-local-server.ts to mount Perseus and the
# frontend repo at their exact host paths inside the rspack container, so
# all absolute paths in pnpm-lock.yaml and virtual-store symlinks resolve
# correctly.
#
# Requires PERSEUS_ROOT and FRONTEND_ROOT to be set in the env passed to
# docker compose (written into docker-compose.env by the script).
services:
    rspack:
        # NOTE: Do NOT override RSPACK_HMR_HOSTNAME or add an 8226 host port
        # here. An earlier version of this file blanked RSPACK_HMR_HOSTNAME and
        # re-added port 8226 to force legacy direct-WebSocket HMR, working
        # around hmr.khanacademy.dev not yet resolving. That tlsproxy routing
        # change has since landed (the frontend now routes
        # hmr.khanacademy.dev -> rspack:8224 through the TLS proxy and no longer
        # exposes an 8226 host port), so those overrides now conflict with the
        # frontend config and break edge->backend routing ("error talking to
        # backend in localdev"). Inherit the frontend's HMR settings unchanged.
        volumes:
            - "${PERSEUS_ROOT}:${PERSEUS_ROOT}"
            - "${FRONTEND_ROOT}:${FRONTEND_ROOT}"